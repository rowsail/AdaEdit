name: AppImage

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      full:
        description: "Also build the full bundle (toolchain + ALS + SDK)"
        type: boolean
        default: false

# Built in an Ubuntu 22.04 container (glibc 2.35, Qt 5.15) -- the oldest base
# that compiles the editor (it uses QFont::families(), Qt 5.13+).
jobs:
  editor:
    name: Editor AppImage
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    steps:
      - name: Install build deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential cmake qtbase5-dev qtbase5-dev-tools libqscintilla2-qt5-dev \
            git ca-certificates curl file libfuse2 xz-utils
      - uses: actions/checkout@v5
      - name: Build editor AppImage
        run: BUNDLE=editor bash packaging/build-appimage.sh
      - uses: actions/upload-artifact@v7
        with:
          name: AdaEdit-x86_64.AppImage
          path: packaging/AdaEdit-x86_64.AppImage
          if-no-files-found: error

  full:
    name: Full bundle AppImage
    # only on a version tag, or a manual run that ticks "full"
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.full)
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    steps:
      - name: Install build deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential cmake qtbase5-dev qtbase5-dev-tools libqscintilla2-qt5-dev \
            git ca-certificates curl wget file libfuse2 xz-utils unzip zstd python3
      - uses: actions/checkout@v5
      - name: Install Alire (build-time toolchain fetcher)
        run: |
          . packaging/manifest.env
          curl -fsSL -o /tmp/alr.zip "$ALR_URL"
          unzip -q /tmp/alr.zip -d /opt/alire
          echo "/opt/alire/bin" >> "$GITHUB_PATH"
      - name: Build FULL AppImage
        run: BUNDLE=full bash packaging/build-appimage.sh
      - uses: actions/upload-artifact@v7
        with:
          name: AdaEdit-full-x86_64.AppImage
          path: packaging/AdaEdit-full-x86_64.AppImage
          if-no-files-found: error
      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/AdaEdit-full-x86_64.AppImage
